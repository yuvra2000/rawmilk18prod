<div class="card-dispatch container-fluid">
  <h4 class="heading">Create Dispatch</h4>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <!-- Step 1 -->
    <app-main-details [form]="form"></app-main-details>

    <!-- Step 2 -->
    <app-chamber-details [rows]="rows"></app-chamber-details>

    <!-- Step 3 -->
    <app-mcc-selection [form]="form"></app-mcc-selection>

    <!-- Debug Info -->
    <!-- <div class="alert alert-info mt-3">
      MCCs Count: {{ mccs.controls.length }}
    </div> -->

    <!-- Show MCC Chambers only if MCCs exist -->
    <div *ngIf="mccs.controls.length > 0">
      <app-mcc-chambers [mccs]="mccs"></app-mcc-chambers>
    </div>

    <button type="submit" class="btn btn-primary mt-3">Submit</button>
  </form>
</div>
