<!-- <p>main-details works!</p> -->
<div class="p-3 mb-3" [formGroup]="form">
  <!-- <h5>Main Details</h5> -->

  <div class="row">
    <div class="col form-input">
      <label class="form-label">Indent No</label>
      <input
        type="text"
        class="form-control"
        formControlName="indent"
        placeholder="Indent"
      />
    </div>

    <div class="col form-input">
      <label class="form-label">LR No</label>
      <input
        type="text"
        class="form-control"
        formControlName="Lr_nu"
        placeholder="LR No"
      />
    </div>

    <div class="col form-input">
      <label class="form-label">Plant</label>
      <input
        type="text"
        class="form-control"
        formControlName="plant"
        placeholder="Plant"
      />
    </div>

    <div class="col form-input">
      <label class="form-label">MCC/BMC</label>
      <!-- <input type="text" class="form-control" formControlName="MCC" /> -->
      <ng-select
        [items]="store.state().mcclist"
        bindLabel="displayName"
        formControlName="MCC"
        placeholder="Select MCC/BMC"
        [searchable]="true"
        [clearable]="true"
      ></ng-select>
    </div>

    <div class="col form-input">
      <label class="form-label">Vehicle</label>
      <ng-select
        [items]="store.state().vehicleOptions"
        bindLabel="VehicleNo"
        bindValue="VehicleId"
        formControlName="vehicle"
        placeholder="Select Vehicle"
        [searchable]="true"
        [clearable]="true"
        (change)="onVehicleChange($event)"
      ></ng-select>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col form-input">
      <label class="form-label">Driver Name</label>
      <input
        type="text"
        class="form-control"
        formControlName="DriverName"
        placeholder="Driver Name"
      />
    </div>

    <div class="col form-input">
      <label class="form-label">Driver Number</label>
      <input
        type="text"
        class="form-control"
        formControlName="Driver_no"
        placeholder="Driver Number"
      />
    </div>

    <div class="col form-input">
      <label class="form-label">Dispatch Date</label>
      <input
        type="datetime-local"
        step="1"
        class="form-control"
        [min]="minDate()"
        [max]="maxDate()"
        formControlName="dispatchDate"
        placeholder="Dispatch Date"
      />
    </div>

    <div class="col form-input">
      <label class="form-label">Transporter</label>
      <ng-select
        [items]="store.state().selectedVehicleTransporters"
        bindLabel="TransporterName"
        bindValue="TransporterId"
        formControlName="transporter"
        placeholder="Select Transporter"
        [searchable]="true"
        [clearable]="true"
        placeholder="Select Transporter"
      ></ng-select>
    </div>

    <div class="col form-input">
      <label class="form-label">Remarks</label>
      <input
        type="text"
        class="form-control"
        formControlName="remarks"
        placeholder="Remarks"
      />
    </div>
  </div>
</div>
