<app-header [title]="'Adda Wise Report'"></app-header>
<app-collapse-wrapper>
  <filter-form
    #addaWiseReportFilterForm
    [dynamicFields]="store.filterfields()"
    (formSubmit)="store.onFormSubmit($event)"
  >
  </filter-form>
</app-collapse-wrapper>
@if (store.rowData().length > 0) {
  <app-advanced-grid
    [rowData]="store.rowData()"
    [config]="store.columnConfig()"
    [loadingRowData]="store.loading()"
  >
    <h5 class="text-center table-heading">Adda Wise Report</h5>
  </app-advanced-grid>
}
