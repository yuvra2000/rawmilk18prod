<app-header [title]="'Halt Report'"></app-header>

<app-collapse-wrapper>
  <filter-form
    [dynamicFields]="store.filterfields()"
    [initialData]="store.initialData()"
    (formSubmit)="store.onFormSubmit($event)"
    (controlValueChange)="store.onFilterChange($event)"
  >
  </filter-form>
</app-collapse-wrapper>

<app-advanced-grid
  [rowData]="store.rowData()"
  [config]="store.columnConfig()"
  [loadingRowData]="store.loading()"
>
  <h5 class="text-center table-heading">Halt Report</h5>
</app-advanced-grid>
