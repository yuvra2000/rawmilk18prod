<!-- <p>main-details works!</p> -->
<div class="p-3 mb-3" [formGroup]="form">
  <!-- <h5>Main Details</h5> -->

  <div class="row gy-3">
    <div class="col-lg-2 form-input" [ngClass]="isEditMode() ? 'd-none' : ''">
      <label class="form-label required">Indent No</label>
      <input
        type="text"
        class="form-control"
        formControlName="indent"
        placeholder="Indent"
        [readonly]="!isEditMode"
      />
    </div>

    <div class="col-lg-2 form-input">
      <label class="form-label required">LR No</label>
      <input
        type="text"
        class="form-control"
        formControlName="Lr_nu"
        placeholder="LR No"
      />
    </div>

    <div class="col-lg-2 form-input">
      <label class="form-label required">Plant</label>
      <ng-select
        [items]="store.state().plantList"
        bindLabel="displayName"
        formControlName="plant"
        placeholder="Select plant"
        [searchable]="true"
        [clearable]="true"
        [readonly]="!isEditMode"
      ></ng-select>
    </div>

    <div class="col-lg-2 form-input" [ngClass]="isEditMode() ? 'd-none' : ''">
      <label class="form-label required">MCC/BMC</label>
      <!-- <input type="text" class="form-control" formControlName="MCC" /> -->
      <ng-select
        [items]="store.state().mcclist"
        bindLabel="displayName"
        formControlName="MCC"
        placeholder="Select MCC/BMC"
        [searchable]="true"
        [clearable]="true"
        [readonly]="!isEditMode"
      ></ng-select>
    </div>

    <div class="col-lg-2 form-input">
      <label class="form-label required">Vehicle</label>
      <ng-select
        [items]="store.state().vehicleOptions"
        bindLabel="VehicleNo"
        formControlName="vehicle"
        placeholder="Select Vehicle"
        [searchable]="true"
        [clearable]="true"
        (change)="onVehicleChange($event)"
      ></ng-select>
    </div>
    <!-- </div> -->

    <!-- <div class="row mt-3"> -->
    <div class="col-lg-2 form-input">
      <label class="form-label required">Driver Name</label>
      <input
        type="text"
        class="form-control"
        formControlName="DriverName"
        placeholder="Driver Name"
      />
    </div>

    <div class="col-lg-2 form-input">
      <label class="form-label required">Driver Number</label>
      <input
        type="text"
        class="form-control"
        formControlName="Driver_no"
        placeholder="Driver Number"
      />
    </div>

    <div class="col-lg-2 form-input">
      <label class="form-label required">Dispatch Date</label>
      <input
        type="datetime-local"
        step="1"
        class="form-control"
        [min]="minDate()"
        [max]="maxDate()"
        formControlName="dispatchDate"
        placeholder="Dispatch Date"
      />
    </div>

    <div class="col-lg-2 form-input">
      <label class="form-label">Transporter</label>
      <ng-select
        [items]="store.state().selectedVehicleTransporters"
        bindLabel="TransporterName"
        formControlName="transporter"
        placeholder="Select Transporter"
        [searchable]="true"
        [clearable]="true"
        placeholder="Select Transporter"
      ></ng-select>
    </div>

    <div class="col-lg-2 form-input">
      <label class="form-label">Remarks</label>
      <input
        type="text"
        class="form-control"
        formControlName="remarks"
        placeholder="Remarks"
      />
    </div>
  </div>
</div>
