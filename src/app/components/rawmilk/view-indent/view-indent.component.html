<app-header [title]="'View Indent'">
  ></app-header>
<app-collapse-wrapper>
  <div class="header h-5 w-5 cursor-pointer" custom-icon>
    <i class="fa fa-plus-circle icon-add" (click)="openAddIndent()"></i>
  </div>
  <filter-form #viewIndentFilter [dynamicFields]="filterfields()" (formSubmit)="onFormSubmit($event)">
  </filter-form>
</app-collapse-wrapper>
<app-advanced-grid [rowData]="indentRowData()" [config]="indentConfig()"
  (selectionChanged)="handleSelectionChange($event)">
  <h5 class="text-center table-heading">View Indent List</h5>
  <div class="header h-5 w-5 cursor-pointer" slot="right">
    <!-- <i class="fa fa-plus-circle icon-add" (click)="openAddIndent()"></i> -->
    <i class="fa-solid fa-circle-xmark icon-delete" (click)="closeIntent()"></i>
  </div>
</app-advanced-grid>
