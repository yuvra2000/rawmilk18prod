<app-collapse-wrapper>
  <div class="header" custom-icon>
    <i class="fa fa-truck"></i>
  </div>
  <filter-form
    #viewIndentFilter
    [dynamicFields]="filterfields()"
    (formSubmit)="onFormSubmit($event)"
  >
  </filter-form>
</app-collapse-wrapper>
<app-advanced-grid
  [rowData]="indentRowData()"
  [config]="indentConfig()"
  (selectionChanged)="handleSelectionChange($event)"
></app-advanced-grid>
